apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-service
  namespace: ai-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-service
  template:
    metadata:
      labels:
        app: api-service
    spec:
      containers:
        - name: api-service
          image: api-service:latest
          ports:
            - containerPort: 8000
          env:
            - name: AGNO_SERVICE_URL
              value: "http://agno-service.ai-demo.svc.cluster.local:8080"
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: api-service
  namespace: ai-demo
spec:
  selector:
    app: api-service
  ports:
    - port: 8000
      targetPort: 8000
