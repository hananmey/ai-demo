apiVersion: apps/v1
kind: Deployment
metadata:
  name: ui-app
  namespace: ai-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ui-app
  template:
    metadata:
      labels:
        app: ui-app
    spec:
      containers:
        - name: ui-app
          image: ui-app:latest
          ports:
            - containerPort: 8501
          env:
            - name: API_SERVICE_URL
              value: "http://api-service.ai-demo.svc.cluster.local:8000"
          readinessProbe:
            httpGet:
              path: /_stcore/health
              port: 8501
            initialDelaySeconds: 5
          livenessProbe:
            httpGet:
              path: /_stcore/health
              port: 8501
            initialDelaySeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: ui-app
  namespace: ai-demo
spec:
  type: LoadBalancer
  selector:
    app: ui-app
  ports:
    - port: 80
      targetPort: 8501
